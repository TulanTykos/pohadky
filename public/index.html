<!DOCTYPE html>
<html lang="cs">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Pohadkovy Generator</title>
<link href="https://fonts.googleapis.com/css2?family=Cinzel+Decorative:wght@400;700&family=Lora:ital,wght@0,400;0,600;1,400&display=swap" rel="stylesheet">
<style>
  :root {
    --gold:#f0c040;--gold-dark:#c8960a;--deep:#1a0a2e;--pink:#e84393;
    --teal:#00c9b1;--cream:#fdf6e3;--card-bg:rgba(255,255,255,0.07);
    --card-border:rgba(240,192,64,0.3);
  }
  *{box-sizing:border-box;margin:0;padding:0}
  body{min-height:100vh;background:var(--deep);background-image:radial-gradient(ellipse at 20% 20%,#2d1b69 0%,transparent 55%),radial-gradient(ellipse at 80% 80%,#1a0a2e 0%,transparent 55%),radial-gradient(ellipse at 60% 10%,rgba(232,67,147,.15) 0%,transparent 40%);font-family:'Lora',serif;color:var(--cream);overflow-x:hidden}
  .stars{position:fixed;inset:0;pointer-events:none;z-index:0;overflow:hidden}
  .star{position:absolute;background:white;border-radius:50%;animation:twinkle var(--dur) ease-in-out infinite var(--delay)}
  @keyframes twinkle{0%,100%{opacity:.2;transform:scale(1)}50%{opacity:1;transform:scale(1.4)}}
  .container{position:relative;z-index:1;max-width:960px;margin:0 auto;padding:2rem 1.5rem 4rem}
  header{text-align:center;padding:2.5rem 0 2rem}
  .title-main{font-family:'Cinzel Decorative',cursive;font-size:clamp(1.8rem,5vw,3.2rem);color:var(--gold);text-shadow:0 0 30px rgba(240,192,64,.6),0 2px 4px rgba(0,0,0,.8);line-height:1.2}
  .title-sub{font-size:1.05rem;color:rgba(253,246,227,.7);margin-top:.6rem;font-style:italic}
  .magic-line{width:200px;height:2px;background:linear-gradient(90deg,transparent,var(--gold),transparent);margin:1.2rem auto 0}
  .step-label{font-family:'Cinzel Decorative',cursive;font-size:.85rem;color:var(--gold);letter-spacing:.1em;margin-bottom:1rem;display:flex;align-items:center;gap:.6rem}
  .step-label::before,.step-label::after{content:'';flex:1;height:1px;background:linear-gradient(90deg,transparent,var(--gold-dark))}
  .step-label::after{background:linear-gradient(90deg,var(--gold-dark),transparent)}
  .category{margin-bottom:2.5rem}
  .cards-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(110px,1fr));gap:.9rem}
  .card{background:var(--card-bg);border:2px solid var(--card-border);border-radius:16px;padding:.8rem .5rem;cursor:pointer;transition:all .25s ease;text-align:center;position:relative;overflow:hidden;user-select:none;backdrop-filter:blur(4px)}
  .card::before{content:'';position:absolute;inset:0;background:radial-gradient(circle at 50% 0%,rgba(240,192,64,.15),transparent 70%);opacity:0;transition:opacity .25s}
  .card:hover{transform:translateY(-4px) scale(1.04);border-color:rgba(240,192,64,.6)}
  .card:hover::before{opacity:1}
  .card.selected{border-color:var(--gold);background:rgba(240,192,64,.18);transform:translateY(-4px) scale(1.06);box-shadow:0 0 20px rgba(240,192,64,.4),0 8px 24px rgba(0,0,0,.4)}
  .card.selected::before{opacity:1}
  .card-emoji{font-size:2.6rem;line-height:1;display:block;margin-bottom:.4rem}
  .card-svg{width:2.8rem;height:2.8rem;display:block;margin:0 auto .4rem}
  .card-label{font-size:.72rem;color:rgba(253,246,227,.85);line-height:1.3}
  .card.selected .card-label{color:var(--gold);font-weight:600}
  .check-badge{position:absolute;top:5px;right:5px;width:18px;height:18px;background:var(--gold);border-radius:50%;display:none;align-items:center;justify-content:center;font-size:.6rem;color:var(--deep);font-weight:bold}
  .card.selected .check-badge{display:flex}
  .selected-summary{background:rgba(255,255,255,.04);border:1px solid var(--card-border);border-radius:14px;padding:1rem 1.2rem;margin:0 0 2rem;min-height:56px;display:flex;align-items:center;flex-wrap:wrap;gap:.5rem}
  .summary-label{font-size:.8rem;color:rgba(253,246,227,.5);font-style:italic;margin-right:.4rem}
  .tag{background:rgba(240,192,64,.2);border:1px solid rgba(240,192,64,.4);border-radius:20px;padding:.25rem .7rem;font-size:.78rem;color:var(--gold)}
  .generate-btn{display:block;margin:0 auto 2.5rem;padding:1rem 3rem;font-family:'Cinzel Decorative',cursive;font-size:1.1rem;color:var(--deep);background:linear-gradient(135deg,var(--gold),#ffda70,var(--gold-dark));border:none;border-radius:50px;cursor:pointer;box-shadow:0 4px 30px rgba(240,192,64,.5),0 2px 8px rgba(0,0,0,.4);transition:all .3s ease;position:relative;overflow:hidden}
  .generate-btn:hover{transform:translateY(-3px) scale(1.04)}
  .generate-btn:disabled{opacity:.5;cursor:not-allowed;transform:none}
  .story-box{background:linear-gradient(160deg,rgba(45,27,105,.6),rgba(26,10,46,.8));border:1px solid rgba(240,192,64,.4);border-radius:20px;padding:2.5rem;position:relative;display:none;animation:fadeInUp .6s ease}
  .story-box.visible{display:block}
  @keyframes fadeInUp{from{opacity:0;transform:translateY(30px)}to{opacity:1;transform:translateY(0)}}
  .story-box::before{content:'Pohadka';position:absolute;top:-.75rem;left:50%;transform:translateX(-50%);background:var(--deep);padding:0 1rem;font-family:'Cinzel Decorative',cursive;font-size:.75rem;color:var(--gold);letter-spacing:.15em;white-space:nowrap}
  .story-title{font-family:'Cinzel Decorative',cursive;font-size:1.3rem;color:var(--gold);text-align:center;margin-bottom:1.5rem;line-height:1.4}
  .story-text{line-height:1.9;font-size:1.02rem;color:var(--cream)}
  .story-text p{margin-bottom:1em}
  .loading-dots{display:flex;justify-content:center;gap:.5rem;padding:2rem 0}
  .dot{width:10px;height:10px;background:var(--gold);border-radius:50%;animation:bounce 1.2s ease-in-out infinite}
  .dot:nth-child(2){animation-delay:.2s}.dot:nth-child(3){animation-delay:.4s}
  @keyframes bounce{0%,80%,100%{transform:scale(.6);opacity:.4}40%{transform:scale(1.2);opacity:1}}
  .audio-controls{display:flex;flex-direction:column;align-items:center;gap:.8rem;margin-top:1.8rem}
  .read-btn{padding:.75rem 2.2rem;font-family:'Cinzel Decorative',cursive;font-size:.9rem;color:var(--deep);background:linear-gradient(135deg,var(--teal),#00a896);border:none;border-radius:50px;cursor:pointer;box-shadow:0 4px 20px rgba(0,201,177,.4);transition:all .3s ease;display:flex;align-items:center;gap:.6rem}
  .read-btn:hover{transform:translateY(-2px);box-shadow:0 6px 28px rgba(0,201,177,.6)}
  .read-btn.reading{background:linear-gradient(135deg,#e84393,#c0306e);box-shadow:0 4px 20px rgba(232,67,147,.5)}
  .speed-controls{display:flex;align-items:center;gap:.6rem;font-size:.78rem;color:rgba(253,246,227,.5)}
  .speed-btn{background:rgba(255,255,255,.06);border:1px solid rgba(240,192,64,.25);color:rgba(253,246,227,.6);padding:.25rem .65rem;border-radius:20px;cursor:pointer;font-size:.75rem;transition:all .2s}
  .speed-btn:hover,.speed-btn.active{border-color:var(--gold);color:var(--gold);background:rgba(240,192,64,.1)}
  .reset-btn{background:transparent;border:1px solid rgba(240,192,64,.4);color:rgba(253,246,227,.6);padding:.5rem 1.5rem;border-radius:30px;cursor:pointer;font-family:'Lora',serif;font-size:.85rem;transition:all .2s}
  .reset-btn:hover{color:var(--gold);border-color:var(--gold)}
  @media(max-width:600px){.cards-grid{grid-template-columns:repeat(auto-fill,minmax(85px,1fr));gap:.7rem}.card-emoji{font-size:2rem}.story-box{padding:1.8rem 1.2rem}}
</style>
</head>
<body>
<div class="stars" id="stars"></div>
<div class="container">
  <header>
    <div class="title-main">Pohadkovy Generator</div>
    <div class="title-sub">Klikni na obrazky a ja ti vymyslim pohadku!</div>
    <div class="magic-line"></div>
  </header>
  <div class="category"><div class="step-label">Postavy</div><div class="cards-grid" id="grid-postavy"></div></div>
  <div class="category"><div class="step-label">Misto</div><div class="cards-grid" id="grid-mista"></div></div>
  <div class="category"><div class="step-label">Kouzelne veci</div><div class="cards-grid" id="grid-predmety"></div></div>
  <div class="category"><div class="step-label">Jak to dopadne?</div><div class="cards-grid" id="grid-nalada"></div></div>
  <div class="selected-summary" id="summary">
    <span class="summary-label">Vybrane:</span>
    <span id="summary-empty" style="font-size:.8rem;color:rgba(253,246,227,.35);font-style:italic">zatim nic...</span>
  </div>
  <button class="generate-btn" id="generateBtn" onclick="generateStory()">Vygenerovat pohadku!</button>
  <div class="story-box" id="storyBox">
    <div id="storyContent"></div>
    <div class="audio-controls" id="audioControls" style="display:none">
      <button class="read-btn" id="readBtn" onclick="toggleRead()">
        <span id="readIcon">&#9654;</span>
        <span id="readLabel">Precist pohadku</span>
      </button>
      <div class="speed-controls">
        <span>Rychlost:</span>
        <button class="speed-btn" onclick="setSpeed(0.7)" id="speed-slow">Pomalu</button>
        <button class="speed-btn active" onclick="setSpeed(0.9)" id="speed-normal">Normalne</button>
        <button class="speed-btn" onclick="setSpeed(1.2)" id="speed-fast">Rychle</button>
      </div>
      <button class="reset-btn" onclick="resetAll()">Vybrat znovu</button>
    </div>
  </div>
</div>
<script>
// Lukasek — blondaty chlapec 5 let
const SVG_LUKASEK='<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100"><circle cx="50" cy="38" r="22" fill="#FDBCB4"/><ellipse cx="50" cy="28" rx="22" ry="16" fill="#F5C842"/><ellipse cx="38" cy="26" rx="10" ry="8" fill="#E8B820"/><ellipse cx="62" cy="26" rx="10" ry="8" fill="#E8B820"/><ellipse cx="50" cy="22" rx="18" ry="10" fill="#F5C842"/><circle cx="43" cy="38" r="3" fill="#4a3728"/><circle cx="57" cy="38" r="3" fill="#4a3728"/><ellipse cx="50" cy="44" rx="4" ry="2.5" fill="#e8967a"/><rect x="30" y="58" width="40" height="30" rx="8" fill="#5b8dd9"/><ellipse cx="50" cy="58" rx="20" ry="6" fill="#FDBCB4"/></svg>';

// Emmicka — blondata holcicka 2 leta
const SVG_EMMICKA='<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100"><circle cx="50" cy="40" r="20" fill="#FDBCB4"/><ellipse cx="50" cy="28" rx="20" ry="15" fill="#F5C842"/><ellipse cx="32" cy="38" rx="7" ry="14" fill="#F5C842"/><ellipse cx="68" cy="38" rx="7" ry="14" fill="#F5C842"/><ellipse cx="50" cy="24" rx="17" ry="9" fill="#F5C842"/><ellipse cx="32" cy="30" rx="5" ry="10" fill="#E8B820"/><ellipse cx="68" cy="30" rx="5" ry="10" fill="#E8B820"/><circle cx="44" cy="40" r="2.5" fill="#4a3728"/><circle cx="56" cy="40" r="2.5" fill="#4a3728"/><ellipse cx="50" cy="46" rx="3.5" ry="2" fill="#e8967a"/><circle cx="44" cy="41" r=".8" fill="#fff"/><circle cx="56" cy="41" r=".8" fill="#fff"/><rect x="32" y="58" width="36" height="28" rx="8" fill="#e84393"/><ellipse cx="50" cy="58" rx="18" ry="5" fill="#FDBCB4"/></svg>';

// Marta — holcicka s hneydmi vlasy (starsi)
const SVG_MARTA='<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100"><circle cx="50" cy="38" r="22" fill="#FDBCB4"/><ellipse cx="50" cy="26" rx="22" ry="15" fill="#6B3A2A"/><ellipse cx="50" cy="22" rx="18" ry="9" fill="#7D4535"/><ellipse cx="28" cy="40" rx="6" ry="16" fill="#6B3A2A"/><ellipse cx="72" cy="40" rx="6" ry="16" fill="#6B3A2A"/><circle cx="43" cy="38" r="3" fill="#3d2b1f"/><circle cx="57" cy="38" r="3" fill="#3d2b1f"/><ellipse cx="50" cy="44" rx="4" ry="2.5" fill="#e8967a"/><circle cx="43" cy="39" r=".9" fill="#fff"/><circle cx="57" cy="39" r=".9" fill="#fff"/><rect x="30" y="58" width="40" height="30" rx="8" fill="#9b59b6"/><ellipse cx="50" cy="58" rx="20" ry="6" fill="#FDBCB4"/></svg>';

// Editka — rocni holcicka s hneydmi vlasy (baby)
const SVG_EDITKA='<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100"><circle cx="50" cy="42" r="20" fill="#FDBCB4"/><ellipse cx="50" cy="30" rx="18" ry="13" fill="#6B3A2A"/><ellipse cx="50" cy="26" rx="14" ry="8" fill="#7D4535"/><ellipse cx="35" cy="40" rx="5" ry="10" fill="#6B3A2A"/><ellipse cx="65" cy="40" rx="5" ry="10" fill="#6B3A2A"/><circle cx="44" cy="42" r="2.5" fill="#3d2b1f"/><circle cx="56" cy="42" r="2.5" fill="#3d2b1f"/><ellipse cx="50" cy="47" rx="3" ry="2" fill="#e8967a"/><circle cx="44" cy="43" r=".8" fill="#fff"/><circle cx="56" cy="43" r=".8" fill="#fff"/><ellipse cx="50" cy="35" rx="4" ry="3" fill="#f9a8d4"/><rect x="32" y="60" width="36" height="26" rx="10" fill="#f472b6"/><ellipse cx="50" cy="60" rx="18" ry="5" fill="#FDBCB4"/><ellipse cx="36" cy="68" rx="7" ry="9" fill="#FDBCB4"/><ellipse cx="64" cy="68" rx="7" ry="9" fill="#FDBCB4"/></svg>';

// Premek — 2lety chlapec s hneydmi vlasy
const SVG_PREMEK='<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100"><circle cx="50" cy="40" r="21" fill="#FDBCB4"/><ellipse cx="50" cy="28" rx="20" ry="14" fill="#6B3A2A"/><ellipse cx="50" cy="24" rx="16" ry="9" fill="#7D4535"/><ellipse cx="32" cy="37" rx="6" ry="12" fill="#6B3A2A"/><ellipse cx="68" cy="37" rx="6" ry="12" fill="#6B3A2A"/><circle cx="44" cy="40" r="2.8" fill="#3d2b1f"/><circle cx="56" cy="40" r="2.8" fill="#3d2b1f"/><ellipse cx="50" cy="46" rx="3.5" ry="2" fill="#e8967a"/><circle cx="44" cy="41" r=".8" fill="#fff"/><circle cx="56" cy="41" r=".8" fill="#fff"/><rect x="31" y="59" width="38" height="28" rx="8" fill="#2ecc71"/><ellipse cx="50" cy="59" rx="19" ry="5.5" fill="#FDBCB4"/></svg>';

const categories={
  postavy:{items:[
    {svg:SVG_LUKASEK, label:"Lukasek"},
    {svg:SVG_EMMICKA, label:"Emmicka"},
    {svg:SVG_MARTA,   label:"Marta"},
    {svg:SVG_EDITKA,  label:"Editka"},
    {svg:SVG_PREMEK,  label:"Premek"},
    {emoji:"&#128120;",label:"Princezna"},
    {emoji:"&#129312;",label:"Princ"},
    {emoji:"&#129497;",label:"Carodej"},
    {emoji:"&#129498;",label:"Vila"},
    {emoji:"&#128009;",label:"Drak"},
    {emoji:"&#129412;",label:"Jednorozec"},
    {emoji:"&#128058;",label:"Vlk"},
    {emoji:"&#129100;",label:"Trpaslik"},
    {emoji:"&#129418;",label:"Liska"},
    {emoji:"&#129500;",label:"Morska panna"},
    {emoji:"&#128059;",label:"Medved"},
    {emoji:"&#128071;",label:"Rytir"}
  ]},
  mista:{items:[
    {emoji:"&#127984;",label:"Hrad"},
    {emoji:"&#127794;",label:"Les"},
    {emoji:"&#9968;",label:"Hora"},
    {emoji:"&#127754;",label:"More"},
    {emoji:"&#127969;",label:"Chaloupka"},
    {emoji:"&#127802;",label:"Kouzelna zahrada"},
    {emoji:"&#129419;",label:"Louka"},
    {emoji:"&#127961;",label:"Kralovstvi"},
    {emoji:"&#127769;",label:"Mesic"},
    {emoji:"&#127752;",label:"Duha"}
  ]},
  predmety:{items:[
    {emoji:"&#129668;",label:"Kouzelna hulka"},
    {emoji:"&#128142;",label:"Drahokam"},
    {emoji:"&#128481;",label:"Mec"},
    {emoji:"&#127873;",label:"Tajny dar"},
    {emoji:"&#128220;",label:"Kouzelny svitek"},
    {emoji:"&#127822;",label:"Kouzelne jablko"},
    {emoji:"&#128302;",label:"Kristalova koule"},
    {emoji:"&#11088;",label:"Padajici hvezda"},
    {emoji:"&#129371;",label:"Lektvar"},
    {emoji:"&#127926;",label:"Kouzelna pisen"}
  ]},
  nalada:{items:[
    {emoji:"&#128150;",label:"Stastny konec"},
    {emoji:"&#128514;",label:"Vtipne"},
    {emoji:"&#128558;",label:"S prekvapenim"},
    {emoji:"&#127752;",label:"Dobrodruzne"}
  ]}
};

const selected={postavy:[],mista:[],predmety:[],nalada:[]};
let readSpeed=0.9;

function buildCards(){
  for(const[cat,data]of Object.entries(categories)){
    const grid=document.getElementById('grid-'+cat);
    data.items.forEach(item=>{
      const card=document.createElement('div');
      card.className='card';
      const icon=item.svg
        ?'<img class="card-svg" src="data:image/svg+xml,'+encodeURIComponent(item.svg)+'" alt="'+item.label+'"/>'
        :'<span class="card-emoji">'+item.emoji+'</span>';
      card.innerHTML='<div class="check-badge">&#10003;</div>'+icon+'<div class="card-label">'+item.label+'</div>';
      card.addEventListener('click',()=>toggleCard(card,cat,item.label));
      grid.appendChild(card);
    });
  }
}

function toggleCard(card,cat,label){
  const sel=card.classList.contains('selected');
  if(sel){card.classList.remove('selected');selected[cat]=selected[cat].filter(l=>l!==label)}
  else{card.classList.add('selected');selected[cat].push(label)}
  updateSummary();
}

function updateSummary(){
  const el=document.getElementById('summary');
  const empty=document.getElementById('summary-empty');
  const all=[...selected.postavy,...selected.mista,...selected.predmety,...selected.nalada];
  el.querySelectorAll('.tag').forEach(t=>t.remove());
  if(all.length===0){empty.style.display=''}
  else{empty.style.display='none';all.forEach(label=>{const tag=document.createElement('span');tag.className='tag';tag.textContent=label;el.appendChild(tag)})}
}

async function generateStory(){
  const all=[...selected.postavy,...selected.mista,...selected.predmety,...selected.nalada];
  if(all.length===0){alert('Nejdrive vyber aspon jednu vec!');return}
  window.speechSynthesis.cancel();
  resetReadBtn();
  const btn=document.getElementById('generateBtn');
  const storyBox=document.getElementById('storyBox');
  const storyContent=document.getElementById('storyContent');
  const audioControls=document.getElementById('audioControls');
  audioControls.style.display='none';
  btn.disabled=true;
  storyBox.classList.add('visible');
  storyBox.scrollIntoView({behavior:'smooth',block:'start'});
  storyContent.innerHTML='<div class="loading-dots"><div class="dot"></div><div class="dot"></div><div class="dot"></div></div><p style="text-align:center;font-style:italic;color:rgba(253,246,227,.6)">Kouzelnici pripravuji tvou pohadku...</p>';
  try{
    const response=await fetch('/api/generate',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({postavy:selected.postavy.join(', '),mista:selected.mista.join(', '),predmety:selected.predmety.join(', '),nalada:selected.nalada.join(', ')})});
    const data=await response.json();
    if(!response.ok)throw new Error(data.error||'HTTP '+response.status);
    const text=data.story||'';
    const lines=text.trim().split('\n').filter(l=>l.trim());
    const title=lines[0];
    const body=lines.slice(1).join('\n').trim();
    storyContent.innerHTML='<div class="story-title">'+escHtml(title)+'</div><div class="story-text"><p>'+escHtml(body).replace(/\n\n/g,'</p><p>').replace(/\n/g,'<br>')+'</p></div>';
    audioControls.style.display='flex';
    spawnConfetti();
  }catch(err){
    storyContent.innerHTML='<p style="color:#ff8888">Ouha! Kouzelnik se unavil.</p><p style="color:rgba(255,200,200,.7);font-size:.85rem">'+err.message+'</p>';
  }
  btn.disabled=false;
}

function setSpeed(s){
  readSpeed=s;
  document.querySelectorAll('.speed-btn').forEach(b=>b.classList.remove('active'));
  const map={0.7:'speed-slow',0.9:'speed-normal',1.2:'speed-fast'};
  if(map[s])document.getElementById(map[s]).classList.add('active');
  if(window.speechSynthesis.speaking){window.speechSynthesis.cancel();resetReadBtn()}
}

function toggleRead(){
  if(window.speechSynthesis.speaking){window.speechSynthesis.cancel();resetReadBtn();return}
  const titleEl=document.querySelector('.story-title');
  const textEl=document.querySelector('.story-text');
  if(!titleEl||!textEl)return;
  const fullText=titleEl.innerText+'. '+textEl.innerText;
  const utt=new SpeechSynthesisUtterance(fullText);
  utt.lang='cs-CZ';
  utt.rate=readSpeed;
  utt.pitch=1.1;
  const trySpeak=()=>{
    const voices=window.speechSynthesis.getVoices();
    const czVoice=voices.find(v=>v.lang==='cs-CZ')||voices.find(v=>v.lang.startsWith('cs'));
    if(czVoice)utt.voice=czVoice;
    utt.onend=resetReadBtn;
    utt.onerror=resetReadBtn;
    window.speechSynthesis.speak(utt);
  };
  const voices=window.speechSynthesis.getVoices();
  if(voices.length===0){window.speechSynthesis.onvoiceschanged=()=>{window.speechSynthesis.onvoiceschanged=null;trySpeak()}}
  else{trySpeak()}
  document.getElementById('readIcon').innerHTML='&#9646;&#9646;';
  document.getElementById('readLabel').textContent='Zastavit cteni';
  document.getElementById('readBtn').classList.add('reading');
}

function resetReadBtn(){
  document.getElementById('readIcon').innerHTML='&#9654;';
  document.getElementByI
